<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 8.1 - ตารางผ่อนชำระด้วย For Loop</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
        .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 800px; margin: auto; }
        h2 { color: #0f4c5f; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; font-size: 14px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #0f4c5f; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { background: #0b3745; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; text-align: right; }
        th { background-color: #0f4c5f; color: white; padding: 10px; text-align: center; }
        td { padding: 8px 10px; border: 1px solid #ddd; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .summary { background: #e8f4f8; padding: 15px; border-radius: 5px; margin-top: 20px; font-size: 16px; border: 1px solid #bce0ee; }
    </style>
</head>
<body>

    <div class="card">
        <h2>📅 ตารางแจกแจงการผ่อนชำระ (Amortization Table)</h2>
        
        <div class="form-grid">
            <div class="form-group">
                <label>จำนวนเงินกู้ (บาท):</label>
                <input type="number" id="loanAmount" value="100000" min="0">
            </div>
            <div class="form-group">
                <label>อัตราดอกเบี้ยต่อปี (%):</label>
                <input type="number" id="interestRate" value="5" step="0.1" min="0">
            </div>
            <div class="form-group">
                <label>ระยะเวลา (เดือน):</label>
                <input type="number" id="months" value="12" min="1">
            </div>
        </div>

        <button onclick="generateAmortizationTable()">สร้างตารางผ่อนชำระ (For Loop)</button>

        <div id="summaryBox" class="summary" style="display: none;"></div>

        <div style="overflow-x: auto;">
            <table id="amortizationTable" style="display: none;">
                <thead>
                    <tr>
                        <th>งวดที่</th>
                        <th>ค่างวด (บาท)</th>
                        <th>ดอกเบี้ย (บาท)</th>
                        <th>เงินต้น (บาท)</th>
                        <th>คงเหลือ (บาท)</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        function generateAmortizationTable() {
            let loanAmount = parseFloat(document.getElementById("loanAmount").value);
            let interestRate = parseFloat(document.getElementById("interestRate").value) / 100 / 12; // ดอกเบี้ยต่อเดือน
            let months = parseInt(document.getElementById("months").value);

            if (isNaN(loanAmount) || isNaN(interestRate) || isNaN(months)) {
                alert("กรุณากรอกข้อมูลให้ครบถ้วนและถูกต้องครับ");
                return;
            }

            // คำนวณค่างวดคงที่ (PMT Formula)
            let monthlyPayment = (loanAmount * interestRate * Math.pow(1 + interestRate, months)) / (Math.pow(1 + interestRate, months) - 1);
            
            let tableHtml = "";
            let remaining = loanAmount;
            let totalInterest = 0;

            // ⚡ ตรรกะ For Loop: วนสร้างแถวตารางตามจำนวนเดือน
            for (let i = 1; i <= months; i++) {
                let interest = remaining * interestRate;
                let principal = monthlyPayment - interest;
                
                // ดักงวดสุดท้ายป้องกันเลขเศษทศนิยมคลาดเคลื่อน
                if (i === months || remaining < principal) {
                    principal = remaining;
                    monthlyPayment = principal + interest;
                }

                remaining -= principal;
                totalInterest += interest;

                // นำข้อมูลแต่ละงวดมาต่อเป็นแท็ก HTML
                tableHtml += `
                    <tr>
                        <td style="text-align: center;">${i}</td>
                        <td>${monthlyPayment.toLocaleString('th-TH', {minimumFractionDigits: 2})}</td>
                        <td>${interest.toLocaleString('th-TH', {minimumFractionDigits: 2})}</td>
                        <td>${principal.toLocaleString('th-TH', {minimumFractionDigits: 2})}</td>
                        <td>${Math.max(0, remaining).toLocaleString('th-TH', {minimumFractionDigits: 2})}</td>
                    </tr>
                `;
            }

            // แสดงตารางและสรุปผล
            document.getElementById("tableBody").innerHTML = tableHtml;
            document.getElementById("amortizationTable").style.display = "table";
            
            let totalPaid = loanAmount + totalInterest;
            let summaryBox = document.getElementById("summaryBox");
            summaryBox.innerHTML = `
                <strong>สรุปผลการคำนวณ:</strong><br>
                ค่างวดต่อเดือน: <strong>${monthlyPayment.toLocaleString('th-TH', {minimumFractionDigits: 2})} บาท</strong><br>
                รวมเงินที่ต้องชำระทั้งสิ้น: ${totalPaid.toLocaleString('th-TH', {minimumFractionDigits: 2})} บาท<br>
                รวมดอกเบี้ยตลอดสัญญา: <span style="color: #e74c3c; font-weight: bold;">${totalInterest.toLocaleString('th-TH', {minimumFractionDigits: 2})} บาท</span>
            `;
            summaryBox.style.display = "block";
        }
    </script>
</body>
</html>
