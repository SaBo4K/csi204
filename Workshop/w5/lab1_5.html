<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 1.5 - LocalStorage</title>
    <style>
        body {
            font-family: 'Sarabun', 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
            padding-bottom: 60px;
        }

        header {
            background: #0f4c5f;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 500px;
            margin: 30px auto;
            padding: 0 15px;
        }

        .card {
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .card h2 {
            color: #0f4c5f;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
            font-size: 20px;
            border-bottom: 2px solid #f4f7f6;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #0f4c5f;
        }

        button {
            width: 100%;
            padding: 12px;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-submit {
            background-color: #0f4c5f;
        }

        .btn-submit:hover {
            background-color: #0b3745;
        }

        .btn-clear {
            background-color: #e74c3c;
            margin-top: 15px;
        }

        .btn-clear:hover {
            background-color: #c0392b;
        }

        footer {
            background: #222;
            color: #bbb;
            text-align: center;
            padding: 15px;
            font-size: 14px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }

        /* 💡 ส่วนจัดรูปแบบกล่องรายชื่อผู้ใช้ตาม ID ของอาจารย์ */
        #userList {
            background-color: #fafafa;
            border: 1px solid #e0e0e0;
            padding: 15px;
            border-radius: 6px;
        }
        
        #userList h3 {
            margin-top: 0;
            color: #0f4c5f;
            font-size: 16px;
        }

        #userList ul {
            padding-left: 20px;
            margin-bottom: 0;
        }

        #userList li {
            margin-bottom: 8px;
            font-size: 15px;
            color: #444;
        }
    </style>
</head>
<body>

    <header>
        <h1>Lab 1.5 - LocalStorage Multi-User System</h1>
    </header>

    <div class="container">
        <div class="card">
            <h2>Register Form</h2>
            <form onsubmit="return validateForm()">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter your name">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="text" id="email" placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="text" id="phone" placeholder="Enter your phone number">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password (at least 6 chars)">
                </div>

                <button type="submit" class="btn-submit">Submit & Save Data</button>
            </form>
        </div>

        <div class="card">
            <h2>Database Contents</h2>
            
            <div id="userList">
                <h3>Registered Users</h3>
                <p style="color: #999; font-size: 14px;">No users registered yet.</p>
            </div>
            
            <button onclick="clearStorage()" class="btn-clear">Clear All Users</button>
        </div>
    </div>

    <footer>© 2026 - CSI204</footer>

    <script src="demo-2.js"></script>

</body>
</html>
