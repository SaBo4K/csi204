<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 3.2 - ระบบคำนวณค่างวดรถยนต์แบบย่อ</title>
    <style>
        body {
            font-family: 'Sarabun', 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
        }
        header {
            background: #0f4c5f;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 15px;
        }
        .card {
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .card h2 {
            color: #0f4c5f;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 20px;
            border-bottom: 2px solid #f4f7f6;
            padding-bottom: 10px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #0f4c5f;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #0f4c5f;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #0b3745;
        }
        #carSummary {
            background-color: #fcfcfc;
            border: 1px solid #e0e0e0;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        .table-responsive {
            overflow-x: auto;
            margin-top: 15px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            text-align: right;
        }
        table th {
            background-color: #0f4c5f;
            color: white;
            padding: 10px;
            font-weight: bold;
        }
        table td {
            padding: 10px;
            border-bottom: 1px solid #e0e0e0;
        }
        table tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        .text-center { text-align: center; }
    </style>
</head>
<body>

    <header>
        <h1>Lab 3.2 - Car Installment Calculator & Validation</h1>
    </header>

    <div class="container">
        <div class="card">
            <h2>ฟอร์มคำนวณค่างวดรถยนต์</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label for="carPrice">ราคารถยนต์ (บาท)</label>
                    <input type="number" id="carPrice" value="800000" min="0">
                </div>
                <div class="form-group">
                    <label for="downPayment">เงินดาวน์ (บาท)</label>
                    <input type="number" id="downPayment" value="160000" min="0">
                </div>
                <div class="form-group">
                    <label for="interestRate">อัตราดอกเบี้ยต่อปี (%) (แนะนำ 2 - 5%)</label>
                    <input type="number" id="interestRate" value="3.0" step="0.1" min="0">
                </div>
                <div class="form-group">
                    <label for="months">ระยะเวลาผ่อนชำระ (งวด/เดือน)</label>
                    <select id="months">
                        <option value="12">12 งวด (1 ปี)</option>
                        <option value="24">24 งวด (2 ปี)</option>
                        <option value="36">36 งวด (3 ปี)</option>
                        <option value="48" selected>48 งวด (4 ปี)</option>
                        <option value="60">60 งวด (5 ปี)</option>
                        <option value="72">72 งวด (6 ปี)</option>
                        <option value="84">84 งวด (7 ปี)</option>
                    </select>
                </div>
            </div>
            <button onclick="calculateCarLoan()">คำนวณค่างวดรถยนต์</button>
        </div>

        <div class="card">
            <h2>สรุปผลการเงินและตารางผ่อนชำระแบบย่อ</h2>
            
            <div id="carSummary">
                <p style="color: #999; text-align: center;">กรอกข้อมูลแล้วกดปุ่มคำนวณเพื่อแสดงผลสรุป</p>
            </div>

            <div class="table-responsive" id="paymentTable"></div>
        </div>
    </div>

    <script src="demo-3.1.js"></script>
</body>
</html>
