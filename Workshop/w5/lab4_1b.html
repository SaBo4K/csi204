<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 4.1b - ข้อมูลของคุณ</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; transition: all 0.3s ease; display: flex; justify-content: center; padding: 50px; }
        .card { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 100%; max-width: 400px; text-align: center; }
        h2 { border-bottom: 2px solid #ccc; padding-bottom: 10px; margin-top: 0; }
        .info-box { background: #f9f9f9; padding: 15px; border-radius: 5px; text-align: left; margin-bottom: 20px; color: #333; border: 1px solid #ddd; }
        .info-box p { margin: 5px 0; font-size: 16px; }
        button { width: 100%; padding: 10px; margin-top: 10px; border: none; border-radius: 5px; font-size: 15px; cursor: pointer; font-weight: bold; }
        .btn-theme { background: #3498db; color: white; }
        .btn-clear { background: #e74c3c; color: white; }
        
        /* สไตล์สำหรับ Theme สีต่างๆ ที่จะถูกดึงมาใช้ด้วย JS */
        body.theme-light { background-color: #f4f7f6; color: #333; }
        body.theme-dark { background-color: #2c3e50; color: #ecf0f1; }
        body.theme-blue { background-color: #0f4c5f; color: #ffffff; }
    </style>
</head>
<body>

    <div class="card">
        <h2>ยินดีต้อนรับสู่โปรไฟล์ของคุณ</h2>
        
        <div class="info-box" id="displayData">
            </div>

        <button class="btn-theme" onclick="switchTheme()">สลับ Theme สุ่มสีเล่น</button>
        <button class="btn-clear" onclick="clearData()">🗑️ ล้างข้อมูลและกลับหน้าแรก</button>
    </div>

    <script>
        // 1. ฟังก์ชันดึงข้อมูลและเปลี่ยนธีมเมื่อโหลดหน้าเว็บ
        window.onload = function() {
            let savedName = localStorage.getItem("myname");
            let savedEmail = localStorage.getItem("myemail");
            let savedPhone = localStorage.getItem("myphone");
            let savedTheme = localStorage.getItem("mytheme");

            // ดักจับกรณีไม่มีข้อมูล (แอบเข้าหน้านี้โดยยังไม่กรอก) ให้เด้งกลับไปหน้าแรก
            if (!savedName) {
                alert("ไม่พบข้อมูลในระบบ กรุณากรอกข้อมูลก่อน!");
                window.location.href = "lab4_1a.html";
                return;
            }

            // แสดงข้อมูล
            document.getElementById("displayData").innerHTML = `
                <p><strong>ชื่อ:</strong> ${savedName}</p>
                <p><strong>อีเมล:</strong> ${savedEmail}</p>
                <p><strong>เบอร์โทร:</strong> ${savedPhone}</p>
                <p><strong>ธีมปัจจุบัน:</strong> <span style="text-transform: capitalize;">${savedTheme}</span></p>
            `;

            // ใช้ธีมที่เลือกไว้กับหน้าเว็บ
            document.body.className = "theme-" + savedTheme;
        }

        // 2. ฟังก์ชันสลับ Theme เล่นๆ (ตามโจทย์ให้เปลี่ยน Theme ได้)
        function switchTheme() {
            let themes = ['light', 'dark', 'blue'];
            let currentTheme = localStorage.getItem("mytheme");
            // หา index ธีมปัจจุบัน แล้วสลับไปอันถัดไป
            let nextIndex = (themes.indexOf(currentTheme) + 1) % themes.length;
            let newTheme = themes[nextIndex];

            // เซฟธีมใหม่ลงเครื่องและรีเฟรชหน้าให้สีเปลี่ยน
            localStorage.setItem("mytheme", newTheme);
            location.reload(); 
        }

        // 3. ฟังก์ชันล้างข้อมูล (เคลียร์ทิ้งทั้งหมด)
        function clearData() {
            if (confirm("ต้องการล้างข้อมูลส่วนตัวทั้งหมดออกจากระบบใช่หรือไม่?")) {
                localStorage.clear();
                alert("ล้างข้อมูลเรียบร้อย!");
                window.location.href = "lab4_1a.html"; // เตะกลับไปหน้าแรก
            }
        }
    </script>
</body>
</html>
