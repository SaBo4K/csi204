<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 1.4 - Register Form Validation</title>
    <style>
        /* ตั้งค่าพื้นหลังและฟอนต์หน้าเว็บให้เข้าธีมเดิม */
        body {
            font-family: 'Sarabun', 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
        }

        header {
            background: #0f4c5f;
            color: white;
            padding: 20px;
            text-align: center;
        }

        /* ตกแต่งกล่องฟอร์มสมัครสมาชิก */
        .form-container {
            background: #ffffff;
            padding: 30px;
            max-width: 450px;
            margin: 40px auto;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .form-container h2 {
            color: #0f4c5f;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
        }

        /* ตกแต่งฟิลด์รับข้อมูล (Input) */
        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box; /* ป้องกันกล่องขยายทะลุขอบ */
        }

        .form-group input:focus {
            outline: none;
            border-color: #0f4c5f; /* เปลี่ยนสีขอบเมื่อคลิกพิมพ์ */
        }

        /* ตกแต่งปุ่มกด */
        button {
            width: 100%;
            padding: 12px;
            background-color: #0f4c5f;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #0b3745;
        }

        footer {
            background: #222;
            color: #bbb;
            text-align: center;
            padding: 15px;
            font-size: 14px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <h1>Lab 1.4 - Form Validation System</h1>
    </header>

    <div class="form-container">
        <h2>Register Form</h2>
        
        <form onsubmit="return validateForm()">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Enter your name">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="text" id="email" placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="text" id="phone" placeholder="Enter your phone number">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password (at least 6 chars)">
            </div>

            <button type="submit">Submit Registration</button>
        </form>
    </div>

    <footer>© 2026 - CSI204</footer>

    <script src="demo-2.js"></script>

</body>
</html>
